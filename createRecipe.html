<!-- Create Recipe Form -->
<div class="content">
    <h1>Create New Recipe</h1>
    <form id="create-recipe-form">
        <div class="form-group">
            <label for="recipe-name">Recipe Name:</label>
            <input type="text" id="recipe-name" name="name" required>
        </div>
        <div class="form-group">
            <label for="cook-time">Cook Time (minutes):</label>
            <input type="number" id="cook-time" name="cookTime" required>
        </div>
        <div class="form-group">
            <label for="ingredients">Ingredients (one per line):</label>
            <textarea id="ingredients" name="ingredients" rows="10" required></textarea>
        </div>
        <div class="form-group">
            <label for="instructions">Instructions (one per line):</label>
            <textarea id="instructions" name="instructions" rows="10" required></textarea>
        </div>
        <button type="submit">Create Recipe</button>
    </form>
    <div id="message"></div>
</div>
