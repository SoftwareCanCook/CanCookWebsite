<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Cook - Pantry</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pantry.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar"></nav>

    <!-- Welcome Paragraph -->
    <div class="content">
        <h1>Welcome to your personal pantry!</h1>
        <p>Where you can view your owned grocery items and take stock of what you CanCook.</p>
        <p style="margin: 10px 0;">
            <a href="stores.html"><button style="background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer;">🛒 Add Items from Stores</button></a>
        </p>

        <!-- Pantry List by Categories -->
        <div id="pantryCategories" style="margin: 20px 0;">
            <h2>Produce (Fruits & Vegetables)</h2>
            <table id="producTable" style="margin-bottom: 30px;"></table>
            
            <h2>Meats & Seafood</h2>
            <table id="meatsTable" style="margin-bottom: 30px;"></table>
            
            <h2>Dairy</h2>
            <table id="dairyTable" style="margin-bottom: 30px;"></table>
            
            <h2>Bakery</h2>
            <table id="bakeryTable" style="margin-bottom: 30px;"></table>
            
            <h2>Pantry Staples</h2>
            <table id="staplesTable" style="margin-bottom: 30px;"></table>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 - Can Cook - By team C(ooked)++</p>
    </footer>

</body>
</html>
