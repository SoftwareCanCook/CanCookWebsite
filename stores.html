<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Cook - Stores</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pantry.js"></script>
    <script src="js/stores.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar"></nav>

    <!-- Welcome Paragraph -->
    <div class="content">
        <h1>Welcome to our grocery store database!</h1>
        <p>Where you can add food items to your pantry so you CanCook some delicious recipes.</p>

        <!-- Store Links -->
        <div id="storesContainer" style="margin: 20px 0;">
            <p>Loading stores...</p>
        </div>

        <!-- Store Item Popup -->
        <div id="storeItemsPopup" class="popup" style="display: none;">
            <div class="popup-content" style="max-width: 900px; max-height: 80vh; overflow-y: auto;">
                <a href="#" onclick="closeStorePopup()">X</a>
                <h1 id="storePopupTitle">Store Name</h1>
                <p id="storePopupInfo" style="color: #666; margin-bottom: 20px;">Store address and phone</p>
                <div id="storeItemsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; padding: 20px;">
                </div>
            </div>
            <a href="#" class="popup-return" onclick="closeStorePopup()"></a>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 - Can Cook - By team C(ooked)++</p>
    </footer>

</body>
</html>
