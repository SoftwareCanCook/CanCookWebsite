<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can Cook - Stores</title>
    <link rel="stylesheet" href="style.css">
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pantry.js"></script>
    <script src="js/stores.js"></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar"></nav>

    <!-- Welcome Paragraph -->
    <div class="content">
        <h1>Welcome to our grocery store database!</h1>
        <p>Where you can add food items to your pantry so you CanCook some delicious recipes.</p>

        <!-- Dynamic Stores Container -->
        <div id="storesContainer">
            <p style="text-align: center; color: #999;">Loading stores...</p>
        </div>
    </div>

    <!-- Store Items Modal Popup -->
    <div id="storeItemsPopup" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center;">
        <div style="background-color: white; border-radius: 8px; padding: 30px; max-width: 800px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 id="storePopupTitle" style="margin: 0;">Store Inventory</h2>
                <button onclick="closeStorePopup()" style="background-color: #f44336; color: white; border: none; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-size: 16px;">Close</button>
            </div>
            <table id="storeItemsTable" style="width: 100%; border-collapse: collapse;">
            </table>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 - Can Cook - By team C(ooked)++</p>
    </footer>

</body>
</html>
